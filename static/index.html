<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoValuate Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --ferrari-red: #ff2800;
            --carbon-black: #0a0a0a;
            --gunmetal: #1c1c1c;
            --stark-white: #ffffff;
            --subtle-gray: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--carbon-black);
            color: var(--stark-white);
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }

        /* Ambient Background Glow */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(255, 40, 0, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        h1, h2, h3 { font-weight: 300; text-transform: uppercase; letter-spacing: 0.1em; }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; font-weight: 200; letter-spacing: 0.2em; }
        h2 { font-size: 1.5rem; color: var(--subtle-gray); margin-bottom: 2rem; letter-spacing: 0.15em; }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 4rem;
        }
        @media (min-width: 1024px) {
            .app-container { grid-template-columns: 1fr 1.5fr; }
        }

        /* Cards (Glassmorphism) */
        .glass-panel {
            background-color: rgba(28, 28, 28, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.5s ease;
        }
        .glass-panel:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 40, 0, 0.3);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
        }

        /* Forms */
        .form-group { margin-bottom: 2rem; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--subtle-gray); margin-bottom: 0.5rem; }
        input, select {
            width: 100%; background-color: transparent; border: none; border-bottom: 1px solid var(--subtle-gray);
            color: var(--stark-white); font-family: 'Inter', sans-serif; font-size: 1.1rem; padding: 0.5rem 0; transition: all 0.3s ease;
        }
        input:focus, select:focus { outline: none; border-bottom-color: var(--ferrari-red); }
        select { appearance: none; border-radius: 0; }
        select option { background-color: var(--gunmetal); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

        /* Buttons */
        .btn-primary {
            background-color: transparent; color: var(--ferrari-red); border: 1px solid var(--ferrari-red);
            padding: 1rem 2rem; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.2em;
            font-size: 0.8rem; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 100%;
        }
        .btn-primary:hover { background-color: var(--ferrari-red); color: var(--stark-white); box-shadow: 0 0 20px rgba(255, 40, 0, 0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Metrics */
        .metric-row { display: flex; justify-content: space-between; margin-bottom: 3rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 2rem; }
        .metric-box { text-align: center; }
        .metric-label { font-size: 0.65rem; color: var(--subtle-gray); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.5rem; }
        .metric-value { font-size: 1.5rem; font-weight: 300; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
        .metric-value.primary { font-size: 3.5rem; color: var(--ferrari-red); font-weight: 200; text-shadow: 0 0 30px rgba(255, 40, 0, 0.4); margin-top: -0.5rem; }

        /* SHAP Drivers */
        .driver-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .driver-name { color: var(--subtle-gray); }

        /* AI Negotiation Panel */
        .ai-panel { background: rgba(255, 40, 0, 0.05); padding: 1.5rem; border-radius: 8px; border: 1px solid rgba(255, 40, 0, 0.2); margin-top: 2rem; }
        .ai-title-wrapper { display: flex; alignItems: center; gap: 0.5rem; margin-bottom: 1rem; }
        .ai-dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--ferrari-red); box-shadow: 0 0 10px var(--ferrari-red); }
        .ai-title { font-size: 0.9rem; color: var(--ferrari-red); }
        .ai-list { list-style-type: none; }
        .ai-list li { font-size: 0.85rem; margin-bottom: 1rem; line-height: 1.5; padding-left: 1rem; border-left: 2px solid rgba(255,40,0,0.5); }

        /* Loading Spinner */
        .loading-spinner {
            width: 40px; height: 40px; border: 1px solid rgba(255, 40, 0, 0.2); border-top-color: var(--ferrari-red);
            border-radius: 50%; animation: spin 1s linear infinite; margin: 2rem auto; box-shadow: 0 0 15px rgba(255, 40, 0, 0.2);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Fade Animation */
        .fade-in { animation: fadeIn 1s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        #results-container, #loading-container, #error-container { display: none; }
    </style>
</head>
<body>
    <div class="app-container fade-in">
        <!-- Left Column: Form -->
        <div>
            <h1>AutoValuate</h1>
            <div class="glass-panel">
                <form id="valuation-form">
                    <div class="form-group">
                        <label>Vehicle Configuration</label>
                        <input type="text" id="name" value="Maruti Swift Dzire VDI" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Year</label>
                            <input type="number" id="year" value="2017" required>
                        </div>
                        <div class="form-group">
                            <label>Kilometers</label>
                            <input type="number" id="km_driven" value="45000" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Fuel Type</label>
                        <select id="fuel">
                            <option>Petrol</option><option selected>Diesel</option><option>CNG</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Transmission</label>
                        <select id="transmission">
                            <option selected>Manual</option><option>Automatic</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Owner</label>
                        <select id="owner">
                            <option selected>First Owner</option><option>Second Owner</option><option>Third Owner</option>
                        </select>
                    </div>
                    <div class="form-group" style="display:none;">
                        <input type="text" id="seller_type" value="Individual">
                    </div>
                    <button type="submit" id="submit-btn" class="btn-primary">Generate Valuation</button>
                </form>
            </div>
        </div>

        <!-- Right Column: Results -->
        <div style="display: flex; flex-direction: column; justify-content: center;">
            
            <!-- Default State -->
            <div id="default-container" class="fade-in" style="text-align: center; color: var(--subtle-gray); padding-top: 4rem;">
                <p style="letter-spacing: 0.1em; font-size: 0.8rem;">AWAITING VEHICLE SPECIFICATIONS</p>
            </div>

            <!-- Loading State -->
            <div id="loading-container">
                <div class="loading-spinner"></div>
                <p style="text-align: center; color: var(--subtle-gray); letter-spacing: 0.1em; font-size: 0.8rem;">COMPUTING CONFORMAL BOUNDS</p>
            </div>

            <!-- Error State -->
            <div id="error-container" class="glass-panel" style="border-color: var(--ferrari-red); text-align: center;">
                <p id="error-text" style="color: var(--ferrari-red);"></p>
            </div>

            <!-- Results State -->
            <div id="results-container" class="glass-panel fade-in">
                
                <div class="metric-row">
                    <div class="metric-box">
                        <div class="metric-label">Lower Bound (80%)</div>
                        <div class="metric-value" id="res-lower"></div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-label">Estimated Value</div>
                        <div class="metric-value primary" id="res-est"></div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-label">Upper Bound (80%)</div>
                        <div class="metric-value" id="res-upper"></div>
                    </div>
                </div>

                <div style="margin-bottom: 2rem;">
                    <h3 style="font-size: 0.9rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                        <span style="color: var(--ferrari-red);">~</span> Depreciation Curve
                    </h3>
                    <canvas id="depreciationChart" height="150"></canvas>
                </div>

                <div style="margin-bottom: 2rem;">
                    <h3 style="font-size: 0.9rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                        <span style="color: var(--ferrari-red);">+</span> Key Drivers
                    </h3>
                    <div id="drivers-list"></div>
                </div>

                <div class="ai-panel">
                    <div class="ai-title-wrapper">
                        <div class="ai-dot"></div>
                        <h3 class="ai-title">AI Negotiation Intelligence</h3>
                    </div>
                    <ul class="ai-list" id="insights-list"></ul>
                </div>

            </div>
        </div>
    </div>

    <script>
        const formatPrice = (val) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(val);
        let chartInstance = null;

        document.getElementById('valuation-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            document.getElementById('default-container').style.display = 'none';
            document.getElementById('results-container').style.display = 'none';
            document.getElementById('error-container').style.display = 'none';
            document.getElementById('loading-container').style.display = 'block';
            document.getElementById('submit-btn').disabled = true;

            const payload = {
                name: document.getElementById('name').value,
                year: parseInt(document.getElementById('year').value),
                km_driven: parseInt(document.getElementById('km_driven').value),
                fuel: document.getElementById('fuel').value,
                seller_type: document.getElementById('seller_type').value,
                transmission: document.getElementById('transmission').value,
                owner: document.getElementById('owner').value
            };

            try {
                // Determine base URL dynamically (since we serve from same domain now)
                const baseUrl = window.location.origin;
                const response = await fetch(`${baseUrl}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('API Error: ' + response.statusText);
                
                const data = await response.json();
                
                // Artificial delay for cinematic effect
                setTimeout(() => {
                    document.getElementById('loading-container').style.display = 'none';
                    renderResults(data, payload.year);
                    document.getElementById('submit-btn').disabled = false;
                }, 800);

            } catch (err) {
                document.getElementById('loading-container').style.display = 'none';
                document.getElementById('error-text').innerText = err.message;
                document.getElementById('error-container').style.display = 'block';
                document.getElementById('submit-btn').disabled = false;
            }
        });

        function renderResults(data, carYear) {
            document.getElementById('res-lower').innerText = formatPrice(data.confidence_lower_80);
            document.getElementById('res-est').innerText = formatPrice(data.predicted_price);
            document.getElementById('res-upper').innerText = formatPrice(data.confidence_upper_80);

            // Render Drivers
            const driversList = document.getElementById('drivers-list');
            driversList.innerHTML = '';
            data.top_3_shap_features.forEach(f => {
                const color = f.contribution > 0 ? '#10b981' : '#ef4444';
                const sign = f.contribution > 0 ? '+' : '';
                driversList.innerHTML += `
                    <div class="driver-row">
                        <span class="driver-name">${f.feature.replace('_', ' ').toUpperCase()}</span>
                        <span style="color: ${color}">${sign}${formatPrice(f.contribution)}</span>
                    </div>
                `;
            });

            // Render Insights
            const insightsList = document.getElementById('insights-list');
            insightsList.innerHTML = '';
            data.negotiation_insights.forEach(insight => {
                insightsList.innerHTML += `<li>${insight}</li>`;
            });

            // Render Chart
            renderChart(data.predicted_price, carYear);

            document.getElementById('results-container').style.display = 'block';
        }

        function renderChart(currentValue, carYear) {
            const age = 2026 - carYear;
            const decay = 0.12;
            const base = currentValue / Math.pow(1 - decay, age);
            
            const labels = Array.from({length: 15}, (_, i) => `Year ${i + 1}`);
            const dataPoints = Array.from({length: 15}, (_, i) => base * Math.pow(1 - decay, i + 1));
            
            const pointColors = dataPoints.map((_, i) => (i + 1) === age ? '#ff2800' : 'transparent');
            const pointRadii = dataPoints.map((_, i) => (i + 1) === age ? 6 : 0);
            const pointHoverRadii = dataPoints.map((_, i) => (i + 1) === age ? 8 : 4);

            if (chartInstance) chartInstance.destroy();
            
            const ctx = document.getElementById('depreciationChart').getContext('2d');
            
            // Create gradient for the area under the line
            const gradient = ctx.createLinearGradient(0, 0, 0, 150);
            gradient.addColorStop(0, 'rgba(255, 40, 0, 0.4)');
            gradient.addColorStop(1, 'rgba(255, 40, 0, 0.0)');

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Estimated Value',
                        data: dataPoints,
                        borderColor: '#ff2800',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        pointBackgroundColor: pointColors,
                        pointBorderColor: pointColors,
                        pointRadius: pointRadii,
                        pointHoverRadius: pointHoverRadii,
                        tension: 0.4,
                        cubicInterpolationMode: 'monotone'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(10, 10, 10, 0.9)',
                            titleColor: '#888888',
                            bodyColor: '#ffffff',
                            bodyFont: { family: 'Inter', size: 14, weight: 'bold' },
                            titleFont: { family: 'Inter', size: 12 },
                            borderColor: 'rgba(255, 40, 0, 0.5)',
                            borderWidth: 1,
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return formatPrice(context.parsed.y);
                                }
                            }
                        }
                    },
                    scales: {
                        x: { 
                            grid: { display: false }, 
                            ticks: { color: '#888888', font: { family: 'Inter', size: 10 } } 
                        },
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.05)', borderDash: [5, 5] }, 
                            ticks: { 
                                color: '#888888',
                                font: { family: 'Inter', size: 10 },
                                callback: function(value) { return '₹' + (value/100000).toFixed(1) + 'L'; }
                            } 
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
